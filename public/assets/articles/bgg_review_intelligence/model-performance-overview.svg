<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Reported macro F1 performance across model families</title>
  <desc id="desc">Classical models on the shared P2 test set range from 0.6346 to 0.7309 macro F1. Neural and contextual results reported in P3 range from 0.695 to 0.8432, but use distinct experimental settings and are shown separately.</desc>
  <style>
    .bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#d5dbe3;stroke-width:2}.heading{font:700 27px system-ui,sans-serif;fill:#172033}.sub{font:16px system-ui,sans-serif;fill:#566176}.name{font:600 17px system-ui,sans-serif;fill:#263247}.value{font:700 15px ui-monospace,monospace;fill:#fff;text-anchor:end}.grid{stroke:#e4e8ee;stroke-width:1}.bar1{fill:#4974c5}.bar2{fill:#3c9b83}.note{font:15px system-ui,sans-serif;fill:#566176}
  </style>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <text class="heading" x="55" y="55">Macro-F1 across the documented experiments</text>
  <text class="sub" x="55" y="85">The two panels are separated because their datasets and input conditions are not identical.</text>
  <g transform="translate(50 115)">
    <rect class="panel" width="540" height="480" rx="18"/>
    <text class="heading" x="28" y="45" font-size="22">Classical models</text><text class="sub" x="28" y="72">Shared balanced P2 test set</text>
    <g transform="translate(150 100)"><path class="grid" d="M0 0V245M90 0V245M180 0V245M270 0V245M360 0V245"/><text class="sub" x="0" y="275">0.0</text><text class="sub" x="83" y="275">0.2</text><text class="sub" x="173" y="275">0.4</text><text class="sub" x="263" y="275">0.6</text><text class="sub" x="350" y="275">0.8</text></g>
    <text class="name" x="28" y="137">Linear SVM</text><rect class="bar1" x="150" y="116" width="329" height="28" rx="5"/><text class="value" x="471" y="136">0.7309</text>
    <text class="name" x="28" y="202">Naive Bayes</text><rect class="bar1" x="150" y="181" width="326" height="28" rx="5"/><text class="value" x="468" y="201">0.7254</text>
    <text class="name" x="28" y="267">XGBoost</text><rect class="bar1" x="150" y="246" width="309" height="28" rx="5"/><text class="value" x="451" y="266">0.6871</text>
    <text class="name" x="28" y="332">Random forest</text><rect class="bar1" x="150" y="311" width="286" height="28" rx="5"/><text class="value" x="428" y="331">0.6346</text>
    <text class="note" x="28" y="425">Controlled comparison: same corpus partitions and target labels.</text>
  </g>
  <g transform="translate(610 115)">
    <rect class="panel" width="540" height="480" rx="18"/>
    <text class="heading" x="28" y="45" font-size="22">Neural and contextual models</text><text class="sub" x="28" y="72">Reported P3 settings</text>
    <g transform="translate(150 100)"><path class="grid" d="M0 0V245M90 0V245M180 0V245M270 0V245M360 0V245"/><text class="sub" x="0" y="275">0.0</text><text class="sub" x="83" y="275">0.2</text><text class="sub" x="173" y="275">0.4</text><text class="sub" x="263" y="275">0.6</text><text class="sub" x="350" y="275">0.8</text></g>
    <text class="name" x="28" y="137">BERT</text><rect class="bar2" x="150" y="116" width="379" height="28" rx="5"/><text class="value" x="521" y="136">0.8432</text>
    <text class="name" x="28" y="222">FastText LSTM</text><rect class="bar2" x="150" y="201" width="338" height="28" rx="5"/><text class="value" x="480" y="221">0.7520</text>
    <text class="name" x="28" y="307">FastText FNN</text><rect class="bar2" x="150" y="286" width="313" height="28" rx="5"/><text class="value" x="455" y="306">0.6950</text>
    <text class="note" x="28" y="415">BERT used a separate ~60k-review corpus and raw text.</text>
    <text class="note" x="28" y="445">FNN and LSTM share a static-embedding setting.</text>
  </g>
  <text class="note" x="55" y="655">Scores summarize the project record; cross-panel differences should not be interpreted as a controlled ranking.</text>
</svg>
