<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Research progression from raw reviews to structured opinion knowledge</title>
  <desc id="desc">Five connected stages: corpus foundation, lexical and linguistic models, static embeddings and sequence models, contextual BERT, and aspect-level explanations.</desc>
  <style>
    .bg{fill:#f7f8fa}.card{fill:#fff;stroke:#d5dbe3;stroke-width:2}.num{fill:#3157a4}.title{font:700 21px system-ui,sans-serif;fill:#172033}.body{font:16px system-ui,sans-serif;fill:#566176}.arrow{stroke:#8291aa;stroke-width:3;fill:none}.label{font:700 13px system-ui,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect class="bg" width="1200" height="330" rx="24"/>
  <text x="55" y="52" class="title" font-size="27">From review text to research evidence</text>
  <path class="arrow" d="M245 175H275M470 175H500M695 175H725M920 175H950"/>
  <path class="arrow" d="M265 167l10 8-10 8M490 167l10 8-10 8M715 167l10 8-10 8M940 167l10 8-10 8"/>
  <g transform="translate(50 95)"><rect class="card" width="195" height="165" rx="16"/><circle class="num" cx="28" cy="28" r="17"/><text class="label" x="28" y="29">1</text><text class="title" x="20" y="70">Corpus</text><text class="body" x="20" y="100">Acquisition, cleaning,</text><text class="body" x="20" y="125">language and annotation</text><text class="body" x="20" y="150">with traceability</text></g>
  <g transform="translate(275 95)"><rect class="card" width="195" height="165" rx="16"/><circle class="num" cx="28" cy="28" r="17"/><text class="label" x="28" y="29">2</text><text class="title" x="20" y="70">Sparse models</text><text class="body" x="20" y="100">TF-IDF, opinion cues</text><text class="body" x="20" y="125">and controlled classical</text><text class="body" x="20" y="150">benchmarks</text></g>
  <g transform="translate(500 95)"><rect class="card" width="195" height="165" rx="16"/><circle class="num" cx="28" cy="28" r="17"/><text class="label" x="28" y="29">3</text><text class="title" x="20" y="70">Sequence</text><text class="body" x="20" y="100">FastText, FNN and LSTM</text><text class="body" x="20" y="125">to test the value of</text><text class="body" x="20" y="150">word order</text></g>
  <g transform="translate(725 95)"><rect class="card" width="195" height="165" rx="16"/><circle class="num" cx="28" cy="28" r="17"/><text class="label" x="28" y="29">4</text><text class="title" x="20" y="70">Context</text><text class="body" x="20" y="100">BERT fine-tuning with</text><text class="body" x="20" y="125">token meaning conditioned</text><text class="body" x="20" y="150">on the full review</text></g>
  <g transform="translate(950 95)"><rect class="card" width="200" height="165" rx="16"/><circle class="num" cx="28" cy="28" r="17"/><text class="label" x="28" y="29">5</text><text class="title" x="20" y="70">Explanation</text><text class="body" x="20" y="100">Aspects, polarity and</text><text class="body" x="20" y="125">evidence grounded in</text><text class="body" x="20" y="150">review language</text></g>
  <text x="55" y="302" class="body">Each stage inherits the data decisions and artifacts of the stages before it.</text>
</svg>
